server:
  port: 4004 # Gateway listens on port 4004

# --- ADD THIS SECTION AT THE TOP LEVEL ---
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
# -----------------------------------------

spring:
  cloud:
    gateway:
      # Need to add the following server and webflux configuration
      server:
        webflux:
          routes:
            # Route for /api/patients/** to patient-service
            - id: patient-service-route
              uri: http://patient-service:4000
              predicates:
                # Matches both /api/patients AND /api/patients/anything
                - Path=/api/patients, /api/patients/**
              filters:
                - StripPrefix=1

            # Route for /api/docs/patients to patient-service /v3/api-docs
            - id: api-docs-patient-route
              uri: http://patient-service:4000
              predicates:
                - Path=/api-docs/patients
              filters:
                - RewritePath=/api-docs/patients,/v3/api-docs